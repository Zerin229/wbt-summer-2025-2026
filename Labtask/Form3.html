<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width-device-width, initial-select=1.0">
        <title>Form3</title>
    </head>

    <body>
        <form method="post">
            <h3>Create Your Account</h3>
            <p>Join us in a of step.</p>
            <div class="field">
                <label for="full name">Full Name</label>
                <input type="text" id="full name" placeholder="Jane Doe">
            </div>

            <div class="field">
                <label for="age">Age</label>
                <input type="number" id="age" placeholder="28">
            </div>

            <div class="field">
                <label for="date of birth">Date of Birth</label>
                <input type="date" id="date of birth" placeholder="25/06/2026">
            </div>

            <div class="field">
                <label for="email address">Email Address</label>
                <input type="text" id="email address" placeholder="jane@example.com">
            </div>

            <div class="field">
                <label for="password">Password</label>
                <input type="text" id="password" placeholder="*******">
            </div>

            <div class="select">
                <label for="preferred contact">Preferred Contact</label>
                <input type="radio" name="contact" value="email">Email
                <input type="radio" name="contact" value="phone">Phone
                <input type="radio" name="contact" value="sms">SMS
            </div>

            <div class="button">
                <button type="submit" class="btn-primary">Submit</button>
                <button type="reset" class="btn-secondary">Reset</button>
            </div>
    
        </form>   
    </body>   
</html>
