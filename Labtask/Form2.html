<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width-device-width, initial-select=1.0">
        <title>Form2</title>
    </head>
    <body>
        <form method="post">
            <h3>Registration</h3>
            <p>Please complete all fields below.</p>
            <div class="field">
                <label for="full name">Full Name</label>
                <input type="text" id="full name" placeholder="Jane Doe">
            </div>

            <div class="field">
                <label for="postal code">Postal Code</label>
                <input type="number" id="postal code" placeholder="10001">
            </div>

            <div class="field">
                <label for="date of birth">Date of Birth</label>
                <input type="date" id="date of birth" placeholder="25/06/2026">
            </div>

            <div class="field">
                <label for="email address">Email Address</label>
                <input type="text" id="email address" placeholder="jane@example.com">
            </div>

            <div class="field">
                <label for="password">Password</label>
                <input type="text" id="password" placeholder="*******">
            </div>
            

            <div class="drop-down">
                <label for="country">Country</label>
                <select id="country">
                    <option>Select a Country....</option>
                    <option>Bangladesh</option>
                    <option>UK</option>
                    <option>USA</option>
                    <option>Italy</option>
                </select>

            </div>
            
            <div class="button">
                <button type="submit" class="btn-primary">Submit</button>
                <button type="reset" class="btn-secondary">Reset</button>
            </div>
        </form>

    </body>
    </html>
